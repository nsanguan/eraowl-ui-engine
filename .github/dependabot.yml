version: 2
updates:
  # Python dependencies (pip)
  - package-ecosystem: "pip"
    directory: "/eraowl-ui-engine-api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 10
    reviewers:
      - "eraowl"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"

  # Node.js dependencies (npm)
  - package-ecosystem: "npm"
    directory: "/eraowl-ui-engine-web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 10
    reviewers:
      - "eraowl"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 5
    reviewers:
      - "eraowl"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Docker
  - package-ecosystem: "docker"
    directory: "/eraowl-ui-engine-api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 5
    reviewers:
      - "eraowl"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
      include: "scope"

# Grouping rules to reduce PR noise
groups:
  python-dev:
    patterns:
      - "pytest*"
      - "ruff*"
      - "mypy*"
    update-types:
      - "minor"
      - "patch"
  python-prod:
    patterns:
      - "fastapi*"
      - "sqlmodel*"
      - "uvicorn*"
    update-types:
      - "minor"
      - "patch"
  node-dev:
    patterns:
      - "vitest*"
      - "typescript*"
      - "eslint*"
      - "@types/*"
    update-types:
      - "minor"
      - "patch"
  node-ui:
    patterns:
      - "react*"
      - "react-dom*"
      - "zustand*"
      - "tailwindcss*"
    update-types:
      - "minor"
      - "patch"
