services:
  postgres:
    image: postgres:16-alpine
    container_name: eraowl-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eraowl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eraowl}
      POSTGRES_DB: ${POSTGRES_DB:-eraowl_ui_engine}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eraowl} -d ${POSTGRES_DB:-eraowl_ui_engine}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - eraowl-net

  redis:
    image: redis:7-alpine
    container_name: eraowl-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - eraowl-net

  api:
    build:
      context: ./eraowl-ui-engine-api
      dockerfile: Dockerfile
    container_name: eraowl-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - ./eraowl-ui-engine-api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eraowl}:${POSTGRES_PASSWORD:-eraowl}@postgres:5432/${POSTGRES_DB:-eraowl_ui_engine}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:${WEB_PORT:-5173}"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - eraowl-net

  web:
    build:
      context: ./eraowl-ui-engine-web
      dockerfile: Dockerfile
    container_name: eraowl-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT:-8000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5173', r => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - eraowl-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  eraowl-net:
    driver: bridge
