version: "3.8"

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: eraowl-ui-engine-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eraowl-ui-engine-api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Codegen Worker (separate pod — §2.5)
  codegen-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eraowl-ui-engine-codegen-worker
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      # Mount target project root — read-only for scanning, limited write for codegen
      - /u01/eraowl-ops:/target-project:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      python -m app.modules.ui_designer.codegen.worker

volumes:
  redis_data:
