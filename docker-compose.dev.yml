services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  api:
    build:
      context: ./eraowl-ui-engine-api
      dockerfile: Dockerfile
      target: builder
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app
    volumes:
      - ./eraowl-ui-engine-api:/app
      - api_venv:/app/.venv
    ports:
      - "8000:8000"
    environment:
      DATABASE_ECHO: "true"
      LOG_LEVEL: DEBUG
    develop:
      watch:
        - path: ./eraowl-ui-engine-api/app
          action: sync+restart
          target: /app/app

  web:
    build:
      context: ./eraowl-ui-engine-web
      dockerfile: Dockerfile
      target: builder
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./eraowl-ui-engine-web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    develop:
      watch:
        - path: ./eraowl-ui-engine-web/src
          action: sync+restart
          target: /app/src

volumes:
  api_venv:
